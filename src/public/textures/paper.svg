<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Pre-rendered paper texture: subtle crosshatch, tileable, lightweight -->
  <defs>
    <pattern id="paper" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="transparent"/>
      <line x1="0" y1="0" x2="0" y2="8" stroke="rgba(0,0,0,0.025)" stroke-width="0.5"/>
      <line x1="0" y1="0" x2="8" y2="0" stroke="rgba(0,0,0,0.025)" stroke-width="0.5"/>
      <line x1="4" y1="0" x2="4" y2="8" stroke="rgba(0,0,0,0.012)" stroke-width="0.3"/>
      <line x1="0" y1="4" x2="8" y2="4" stroke="rgba(0,0,0,0.012)" stroke-width="0.3"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#paper)"/>
</svg>
